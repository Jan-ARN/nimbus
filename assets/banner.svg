<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Hanken Grotesk','Helvetica Neue',Arial,sans-serif" role="img" aria-label="Nimbus — multi-model weather; the forecast fans out from now">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070c16"/>
      <stop offset="0.52" stop-color="#101d33"/>
      <stop offset="1" stop-color="#1c3149"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb454" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#ff9d5c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff9d5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8ff" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#6ea8ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6ea8ff" stop-opacity="0.13"/>
    </linearGradient>
    <linearGradient id="median" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#9dc3ff"/>
    </linearGradient>
    <clipPath id="fr"><rect width="1200" height="340"/></clipPath>
  </defs>

  <g clip-path="url(#fr)">
    <rect width="1200" height="340" fill="url(#sky)"/>

    <!-- faint stars -->
    <g fill="#dce6ee">
      <circle cx="228" cy="46" r="1" opacity=".6"><animate attributeName="opacity" values=".6;.2;.6" dur="5.5s" repeatCount="indefinite"/></circle>
      <circle cx="372" cy="30" r=".8" opacity=".42"/>
      <circle cx="150" cy="86" r=".75" opacity=".4"/>
      <circle cx="540" cy="52" r=".9" opacity=".5"><animate attributeName="opacity" values=".5;.18;.5" dur="6.8s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="34" r=".8" opacity=".4"/>
    </g>

    <!-- sun sinking at the horizon, right -->
    <circle cx="1015" cy="252" r="152" fill="url(#sun)"/>
    <circle cx="1015" cy="252" r="26" fill="#ffb454" opacity=".92"/>

    <!-- spread band: the p10–p90 envelope, widening as the horizon grows -->
    <path d="M120 206 C440 202 760 196 1180 150 L1180 270 C760 242 440 214 120 210 Z" fill="url(#band)"/>

    <!-- ensemble members fanning out from "now" -->
    <g stroke="#7fa9d0" stroke-width="1.3" fill="none" opacity=".48">
      <path d="M120 208 C440 188 760 166 1180 150"/>
      <path d="M120 208 C440 196 760 182 1180 176"/>
      <path d="M120 208 C440 201 760 196 1180 198"/>
      <path d="M120 208 C440 200 760 210 1180 222"/>
      <path d="M120 208 C440 210 760 226 1180 240"/>
      <path d="M120 208 C440 216 760 246 1180 270"/>
    </g>

    <!-- median path + the "now" node it all diverges from -->
    <path d="M120 208 C440 202 760 202 1180 206" stroke="url(#median)" stroke-width="2.4" fill="none"/>
    <circle cx="120" cy="208" r="10" fill="none" stroke="#eaf2ff" stroke-width="1.2" opacity=".38"/>
    <circle cx="120" cy="208" r="5" fill="#eaf2ff"/>

    <!-- wordmark: the real Nimbus mark (sun on the horizon in an instrument ring) -->
    <g transform="translate(98,96)">
      <g transform="scale(1.7)" stroke="#ffb454" fill="none">
        <circle cx="16" cy="16" r="13.5" stroke-width="1.3" opacity=".5"/>
        <path d="M4.5 19.5 a11.5 11.5 0 0 0 23 0" fill="#ffb454" opacity=".12" stroke="none"/>
        <path d="M4.5 19.5 H27.5" stroke-width="1.7" stroke-linecap="round"/>
        <circle cx="16" cy="19.5" r="4.3" fill="#ffb454" stroke="none"/>
        <g stroke-width="1.6" stroke-linecap="round">
          <path d="M16 12 V9.2"/><path d="M10.3 14 L8.6 12.3"/><path d="M21.7 14 L23.4 12.3"/>
        </g>
      </g>
      <text x="82" y="26" fill="#f7fafe" font-size="58" font-weight="700" letter-spacing="-2">Nimbus</text>
      <text x="84" y="56" fill="#8fa4c0" font-size="14.5" font-weight="600" letter-spacing="4.5" style="text-transform:uppercase">Multi-model weather</text>
    </g>

    <text x="100" y="298" fill="#6f89a6" font-size="16" font-weight="500">A range, not a number — every forecast fans out from &#8220;now.&#8221;</text>
  </g>
</svg>
