<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 214" width="1200" height="214" role="img" aria-label="Prediction is very difficult, especially about the future — Niels Bohr" font-family="'Hanken Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="skyF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070c16"/>
      <stop offset="0.6" stop-color="#101d33"/>
      <stop offset="1" stop-color="#1c3149"/>
    </linearGradient>
    <radialGradient id="glowF" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb454" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#ff9d5c" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ff9d5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bandF" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8ff" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#6ea8ff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#6ea8ff" stop-opacity="0.12"/>
    </linearGradient>
    <clipPath id="frameF"><rect width="1200" height="214"/></clipPath>
  </defs>

  <g clip-path="url(#frameF)">
    <rect width="1200" height="214" fill="url(#skyF)"/>

    <!-- faint stars -->
    <g fill="#dce6ee">
      <circle cx="150" cy="30" r="1" opacity=".65"><animate attributeName="opacity" values=".65;.2;.65" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="330" cy="44" r=".8" opacity=".42"/>
      <circle cx="900" cy="28" r=".9" opacity=".55"><animate attributeName="opacity" values=".55;.18;.55" dur="6.4s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="52" r=".7" opacity=".4"/>
    </g>

    <!-- sun sinking at the horizon, right -->
    <circle cx="1040" cy="180" r="120" fill="url(#glowF)"/>
    <circle cx="1040" cy="180" r="22" fill="#ffb454" opacity=".9"/>

    <!-- the p10–p90 band + members fanning out from "now", low across the frame -->
    <path d="M90 150 C420 148 760 144 1160 116 L1160 176 C760 164 420 156 90 154 Z" fill="url(#bandF)"/>
    <g stroke="#7fa9d0" stroke-width="1.2" fill="none" opacity=".42">
      <path d="M90 152 C420 144 760 130 1160 116"/>
      <path d="M90 152 C420 150 760 148 1160 150"/>
      <path d="M90 152 C420 154 760 164 1160 176"/>
    </g>
    <path d="M90 152 C420 150 760 152 1160 152" stroke="#eaf2ff" stroke-width="1.6" fill="none" opacity=".85"/>
    <circle cx="90" cy="152" r="4" fill="#eaf2ff"/>

    <!-- a fitting quote -->
    <text x="600" y="78" text-anchor="middle" fill="#eef2fa" font-size="24" font-weight="600" letter-spacing="0.2" font-style="italic">&#8220;Prediction is very difficult, especially about the future.&#8221;</text>
    <text x="600" y="106" text-anchor="middle" fill="#8fa4c0" font-size="14" font-weight="600" letter-spacing="2.5" style="text-transform:uppercase">— Niels Bohr</text>

    <!-- the technical creed -->
    <text x="600" y="200" text-anchor="middle" fill="#5f7590" font-size="12" font-weight="500" letter-spacing="1.6">MEDIAN &#183; p10&#8211;p90 SPREAD &#183; 31 GEFS MEMBERS &#183; RELIABLE TO ~14 DAYS, TENDENCY TO 35</text>
  </g>
</svg>
